<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Favicon.png">
<title>Reports Ka. — inChurch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#29b00e;--green-dim:rgba(41,176,14,0.12);--green-glow:rgba(41,176,14,0.35);
    --black:#0a0a0a;--surface:#111111;--surface2:#181818;--border:rgba(255,255,255,0.07);
    --text:#f0f0f0;--muted:#777;--white:#ffffff;
  }
  html{scroll-behavior:smooth}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;overflow-x:hidden}

  /* HERO */
  .hero{min-height:100vh;display:flex;flex-direction:column;padding:0 clamp(1.5rem,6vw,6rem);position:relative;overflow:hidden}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(41,176,14,0.07) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 10% 80%,rgba(41,176,14,0.04) 0%,transparent 60%)}
  .grid-lines{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 30%,transparent 100%)}
  nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:2.2rem 0;border-bottom:1px solid var(--border)}
  .logo{height:36px}
  .nav-meta{font-family:'Syne',sans-serif;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .nav-meta span{color:var(--green)}

  .hero-content{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;justify-content:center;padding:6rem 0 4rem;max-width:820px}
  .eyebrow{font-family:'Syne',sans-serif;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--green);margin-bottom:1.6rem;display:flex;align-items:center;gap:0.8rem}
  .eyebrow::before{content:'';width:32px;height:1px;background:var(--green);display:inline-block}
  h1{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,7vw,5.5rem);font-weight:800;line-height:0.98;letter-spacing:-0.03em;color:var(--white);margin-bottom:2rem}
  h1 em{font-style:normal;color:var(--green)}
  .hero-desc{font-size:clamp(1rem,2vw,1.15rem);color:#aaa;max-width:560px;line-height:1.8;margin-bottom:3rem}

  /* SELECTOR */
  .selector{position:relative;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2.4rem;max-width:640px;display:flex;flex-direction:column;gap:1.6rem}
  .selector-label{font-family:'Syne',sans-serif;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;display:block}
  .selector-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .field{display:flex;flex-direction:column}
  select{
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    background:var(--surface2);color:var(--white);
    border:1px solid var(--border);border-radius:4px;
    padding:0.9rem 2.6rem 0.9rem 1rem;
    font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:400;
    cursor:pointer;transition:border-color 0.25s, background 0.25s;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%2329b00e' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;background-position:right 1rem center;
  }
  select:hover, select:focus{border-color:var(--green-glow);outline:none;background-color:#1c1c1c}
  select option{background:var(--surface2);color:var(--white)}

  .go-btn{
    font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--black);background:var(--green);border:none;border-radius:4px;
    padding:1rem 1.6rem;cursor:pointer;transition:filter 0.25s, transform 0.15s;
    display:flex;align-items:center;justify-content:center;gap:0.6rem;
  }
  .go-btn:hover{filter:brightness(1.1)}
  .go-btn:active{transform:scale(0.98)}
  .go-btn svg{width:16px;height:16px;flex-shrink:0}

  .selector-error{font-size:0.82rem;color:#e6564a;display:none;font-family:'DM Sans',sans-serif}
  .selector-error.show{display:block}

  /* QUICK ACCESS */
  section{padding:5rem clamp(1.5rem,6vw,6rem)}
  .section-header{display:flex;align-items:flex-start;gap:2rem;margin-bottom:3rem}
  .section-num{font-family:'Syne',sans-serif;font-size:0.65rem;letter-spacing:0.2em;color:var(--green);text-transform:uppercase;padding-top:0.25rem}
  h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;color:var(--white);letter-spacing:-0.02em;line-height:1.1}
  h2 .accent{color:var(--green)}

  .reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
  .report-card{background:var(--surface);padding:2rem;display:flex;flex-direction:column;gap:0.6rem;text-decoration:none;color:inherit;transition:background 0.25s;position:relative;overflow:hidden}
  .report-card::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green);opacity:0;transition:opacity 0.3s}
  .report-card:hover{background:var(--surface2)}
  .report-card:hover::after{opacity:1}
  .report-month{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--white)}
  .report-year{font-size:0.85rem;color:var(--muted)}
  .report-tag{margin-top:0.6rem;font-family:'Syne',sans-serif;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--green)}

  footer{border-top:1px solid var(--border);padding:2.5rem clamp(1.5rem,6vw,6rem);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  .footer-logo{height:24px;opacity:0.5}
  .footer-meta{font-size:0.75rem;color:var(--muted);font-family:'Syne',sans-serif;letter-spacing:0.08em}

  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .hero-content>*{animation:fadeUp 0.7s ease both}
  .eyebrow{animation-delay:0.1s}.hero h1{animation-delay:0.25s}.hero-desc{animation-delay:0.35s}.selector{animation-delay:0.45s}
  .fade-in{opacity:0;transform:translateY(20px);transition:opacity 0.6s ease,transform 0.6s ease}
  .fade-in.visible{opacity:1;transform:none}

  @media(max-width:520px){
    .selector-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="grid-lines"></div>
  <nav>
    <img class="logo" src="logo inchurch.png" alt="logo inchurch">
    <div class="nav-meta">CS <span>Ongoing</span></div>
  </nav>

  <div class="hero-content">
    <div class="eyebrow">Relatórios Mensais</div>
    <h1>Reports <em>Ka.</em></h1>
    <p class="hero-desc">Selecione o mês e o ano para acessar o relatório estratégico correspondente.</p>

    <div class="selector">
      <div>
        <span class="selector-label">Escolha o período</span>
        <div class="selector-row">
          <div class="field">
            <select id="mes"></select>
          </div>
          <div class="field">
            <select id="ano"></select>
          </div>
        </div>
      </div>
      <button class="go-btn" id="goBtn">
        Ver Relatório
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
      <div class="selector-error" id="errorMsg">Ainda não existe um relatório publicado para esse período.</div>
    </div>
  </div>
</div>

<!-- ACESSO RÁPIDO -->
<section>
  <div class="section-header fade-in">
    <div class="section-num">01</div>
    <h2>Acesso <span class="accent">Rápido</span></h2>
  </div>
  <div class="reports-grid fade-in" id="quickAccess">
    <!-- Preenchido via JS a partir da lista abaixo -->
  </div>
</section>

<footer>
  <img class="footer-logo" src="logo inchurch.png" alt="InChurch">
  <div class="footer-meta">CS Ongoing — Key Accounts &nbsp;·&nbsp; Reports Ka. &nbsp;·&nbsp; Confidencial</div>
</footer>

<script>
  // ---- Lista de meses (nome exibido + slug usado no nome do arquivo) ----
  // NÃO edite esta lista para adicionar relatórios novos — ela é fixa (os 12 meses do ano).
  // Para adicionar um relatório novo, edite a lista RELATORIOS_PUBLICADOS logo abaixo.
  const MESES = [
    {nome:"Janeiro", slug:"janeiro"},
    {nome:"Fevereiro", slug:"fevereiro"},
    {nome:"Março", slug:"marco"},
    {nome:"Abril", slug:"abril"},
    {nome:"Maio", slug:"maio"},
    {nome:"Junho", slug:"junho"},
    {nome:"Julho", slug:"julho"},
    {nome:"Agosto", slug:"agosto"},
    {nome:"Setembro", slug:"setembro"},
    {nome:"Outubro", slug:"outubro"},
    {nome:"Novembro", slug:"novembro"},
    {nome:"Dezembro", slug:"dezembro"}
  ];

  // ---- Relatórios já publicados (edite esta lista a cada novo mês) ----
  // O "arquivo" deve bater com o nome do arquivo .html no repositório.
  // Lembre-se da vírgula no final de cada linha, exceto a última!
  const RELATORIOS_PUBLICADOS = [
    { mes:"Maio", ano:2026, arquivo:"maio-2026.html" },
    { mes:"Junho", ano:2026, arquivo:"junho-2026.html" }
  ];

  const ANO_ATUAL = new Date().getFullYear();
  const ANOS = [ANO_ATUAL];

  const mesSelect = document.getElementById('mes');
  const anoSelect = document.getElementById('ano');
  const goBtn = document.getElementById('goBtn');
  const errorMsg = document.getElementById('errorMsg');
  const quickAccess = document.getElementById('quickAccess');

  MESES.forEach((m) => {
    const opt = document.createElement('option');
    opt.value = m.slug;
    opt.textContent = m.nome;
    mesSelect.appendChild(opt);
  });

  ANOS.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    anoSelect.appendChild(opt);
  });

  // Pré-seleciona o mês/ano atual
  const hoje = new Date();
  mesSelect.value = MESES[hoje.getMonth()].slug;
  anoSelect.value = ANO_ATUAL;

  goBtn.addEventListener('click', () => {
    errorMsg.classList.remove('show');
    const slug = mesSelect.value;
    const ano = anoSelect.value;
    const arquivo = `${slug}-${ano}.html`;
    window.location.href = arquivo;
  });

  // Monta os cards de acesso rápido
  RELATORIOS_PUBLICADOS.forEach(r => {
    const a = document.createElement('a');
    a.className = 'report-card';
    a.href = r.arquivo;
    a.innerHTML = `
      <div class="report-month">${r.mes}</div>
      <div class="report-year">${r.ano}</div>
      <div class="report-tag">Ver relatório</div>
    `;
    quickAccess.appendChild(a);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, {threshold: 0.12});
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
